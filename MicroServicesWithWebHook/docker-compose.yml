version: '3.8'

services:
  # The Redis Cache Server
  redis-cache:
    image: redis:latest
    container_name: product-redis-cache
    ports:
      - "6379:6379"
    restart: always

  # Bonus: A Web UI to view your Redis Cache (Optional but very helpful)
  redis-insight:
    image: redis/redisinsight:latest
    container_name: product-redis-ui
    ports:
      - "5540:5540"
    depends_on:
      - redis-cache
    restart: always